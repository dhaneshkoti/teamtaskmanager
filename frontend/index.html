<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Team Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --surface3: #22222f;
      --border: #2a2a3a;
      --text: #e8e8f0;
      --text2: #9090a8;
      --text3: #5a5a72;
      --accent: #6c63ff;
      --accent-dim: #6c63ff22;
      --accent-border: #6c63ff44;
      --green: #22c55e;
      --green-dim: #22c55e18;
      --yellow: #f59e0b;
      --yellow-dim: #f59e0b18;
      --red: #ef4444;
      --red-dim: #ef444418;
      --blue: #3b82f6;
      --blue-dim: #3b82f618;
      --radius: 10px;
      --radius-lg: 16px;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Auth Screen */
    .auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 30% 20%, #6c63ff15 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 80%, #3b82f610 0%, transparent 60%),
                  var(--bg);
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow);
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .auth-logo-icon {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .auth-logo-text { font-size: 22px; font-weight: 700; }
    .auth-logo-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

    .auth-tabs {
      display: flex;
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text2);
      transition: all 0.2s;
    }
    .auth-tab.active { background: var(--surface3); color: var(--text); }

    /* Form Elements */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text3); }

    select.form-input { cursor: pointer; }
    select.form-input option { background: var(--surface2); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid #ef444430; }
    .btn-danger:hover { background: var(--red); color: white; }
    .btn-success { background: var(--green-dim); color: var(--green); border: 1px solid #22c55e30; }
    .btn-full { width: 100%; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* App Layout */
    .app { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      z-index: 100;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .sidebar-logo-text { font-weight: 700; font-size: 16px; }

    .sidebar-nav { padding: 12px 8px; flex: 1; overflow-y: auto; }
    .nav-section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 8px 10px 4px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text2);
      transition: all 0.15s;
      margin-bottom: 2px;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--accent-dim); color: var(--accent); }
    .nav-item-icon { font-size: 16px; }
    .nav-badge {
      margin-left: auto;
      background: var(--red);
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 600;
    }

    .sidebar-footer {
      padding: 12px 8px;
      border-top: 1px solid var(--border);
    }
    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: var(--radius);
      cursor: pointer;
    }
    .user-card:hover { background: var(--surface2); }
    .user-avatar {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .user-info { flex: 1; overflow: hidden; }
    .user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      display: inline-block;
      margin-top: 2px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .role-admin { background: var(--accent-dim); color: var(--accent); }
    .role-member { background: var(--green-dim); color: var(--green); }

    /* Main Content */
    .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; }
    .page-header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      position: sticky; top: 0; z-index: 10;
    }
    .page-title { font-size: 20px; font-weight: 700; }
    .page-subtitle { font-size: 13px; color: var(--text2); margin-top: 2px; }

    .page-content { padding: 28px 32px; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
    }
    .stat-label { font-size: 12px; color: var(--text2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 32px; font-weight: 700; margin: 6px 0 4px; font-family: var(--mono); }
    .stat-sub { font-size: 12px; color: var(--text3); }
    .stat-todo .stat-value { color: var(--blue); }
    .stat-inprogress .stat-value { color: var(--yellow); }
    .stat-done .stat-value { color: var(--green); }
    .stat-overdue .stat-value { color: var(--red); }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-title { font-size: 15px; font-weight: 600; }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 12px 14px; font-size: 14px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    .empty-row td { text-align: center; color: var(--text3); padding: 32px; }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-todo { background: var(--blue-dim); color: var(--blue); }
    .badge-inprogress { background: var(--yellow-dim); color: var(--yellow); }
    .badge-done { background: var(--green-dim); color: var(--green); }
    .badge-low { background: var(--green-dim); color: var(--green); }
    .badge-medium { background: var(--yellow-dim); color: var(--yellow); }
    .badge-high { background: var(--red-dim); color: var(--red); }
    .badge-overdue { background: var(--red-dim); color: var(--red); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    /* Filters */
    .filters { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
    .filter-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    .filter-select:focus { border-color: var(--accent); }

    /* Grid layouts */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .three-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

    /* Project card */
    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .project-card:hover { border-color: var(--accent-border); background: var(--surface2); }
    .project-card-name { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .project-card-desc { font-size: 13px; color: var(--text2); margin-bottom: 14px; min-height: 36px; }
    .project-meta { display: flex; gap: 14px; font-size: 12px; color: var(--text3); }
    .project-meta span { display: flex; align-items: center; gap: 4px; }

    /* Progress bar */
    .progress-bar {
      height: 4px;
      background: var(--surface3);
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Task row actions */
    .task-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.15s; }
    tr:hover .task-actions { opacity: 1; }

    /* Alert */
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 16px;
    }
    .alert-error { background: var(--red-dim); color: var(--red); border: 1px solid #ef444430; }
    .alert-success { background: var(--green-dim); color: var(--green); border: 1px solid #22c55e30; }

    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--text3); font-size: 14px; gap: 10px; }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 13px;
      box-shadow: var(--shadow);
      animation: toastIn 0.2s ease;
      max-width: 280px;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .toast-success { border-left: 3px solid var(--green); }
    .toast-error { border-left: 3px solid var(--red); }

    /* Search */
    .search-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 14px 9px 36px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      outline: none;
      width: 220px;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; }

    .members-list { display: flex; flex-direction: column; gap: 8px; }
    .member-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px;
      background: var(--surface2);
      border-radius: var(--radius);
    }
    .member-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .member-info { flex: 1; }
    .member-name { font-size: 13px; font-weight: 500; }
    .member-email { font-size: 12px; color: var(--text3); }

    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col { grid-template-columns: 1fr; }
      .three-col { grid-template-columns: 1fr; }
      .sidebar { transform: translateX(-100%); }
      .main { margin-left: 0; }
    }
  </style>
</head>
<body>

<div id="root"></div>
<div class="toast-container" id="toasts"></div>

<script>
// ============ CONFIG ============
// Same origin in production (Railway serves frontend + API together)
// Only use absolute URL when running frontend separately on port 3000
const API = (window.location.port === '3000') ? 'http://localhost:5000/api' : '/api';

// ============ STATE ============
let state = {
  user: null,
  token: null,
  page: 'dashboard',
  projects: [],
  tasks: [],
  users: [],
  dashboard: null,
  loading: false,
  modals: {},
  filters: { status: '', priority: '', project_id: '', overdue: '' },
  toasts: []
};

// ============ UTILS ============
const $ = id => document.getElementById(id);
const qs = s => document.querySelector(s);

function showToast(msg, type = 'success') {
  const id = Date.now();
  const div = document.createElement('div');
  div.className = `toast toast-${type}`;
  div.textContent = msg;
  div.id = `toast-${id}`;
  $('toasts').appendChild(div);
  setTimeout(() => { div.style.opacity = '0'; div.style.transition = 'opacity 0.3s'; setTimeout(() => div.remove(), 300); }, 3000);
}

async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', ...(state.token ? { Authorization: `Bearer ${state.token}` } : {}) }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${API}${path}`, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function initSession() {
  const saved = localStorage.getItem('ttm_session');
  if (saved) {
    try {
      const { token, user } = JSON.parse(saved);
      state.token = token;
      state.user = user;
      return true;
    } catch {}
  }
  return false;
}

function saveSession() {
  localStorage.setItem('ttm_session', JSON.stringify({ token: state.token, user: state.user }));
}

function clearSession() {
  localStorage.removeItem('ttm_session');
  state.token = null; state.user = null;
}

function avatarInitials(name) {
  return (name || '?').split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}

function isOverdue(due, status) {
  if (!due || status === 'done') return false;
  return new Date(due) < new Date();
}

// ============ RENDER ============
function render() {
  if (!state.user) { renderAuth(); return; }
  renderApp();
}

function renderAuth() {
  $('root').innerHTML = `
  <div class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">⚡</div>
        <div>
          <div class="auth-logo-text">TaskFlow</div>
          <div class="auth-logo-sub">Team Task Manager</div>
        </div>
      </div>
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
        <div class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Create Account</div>
      </div>
      <div id="auth-form"></div>
    </div>
  </div>`;
  renderLoginForm();
}

function switchTab(tab) {
  $('tab-login').classList.toggle('active', tab === 'login');
  $('tab-signup').classList.toggle('active', tab === 'signup');
  tab === 'login' ? renderLoginForm() : renderSignupForm();
}

function renderLoginForm() {
  $('auth-form').innerHTML = `
    <div id="auth-error"></div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="l-email" placeholder="you@example.com" /></div>
    <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="l-pass" placeholder="••••••••" /></div>
    <button class="btn btn-primary btn-full" onclick="doLogin()" style="margin-top:8px">Sign In</button>
    <p style="text-align:center;font-size:12px;color:var(--text3);margin-top:16px">Demo: admin@test.com / 123456 (Admin) &nbsp;|&nbsp; member@test.com / 123456 (Member)</p>`;
}

function renderSignupForm() {
  $('auth-form').innerHTML = `
    <div id="auth-error"></div>
    <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="s-name" placeholder="John Doe" /></div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="s-email" placeholder="you@example.com" /></div>
    <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="s-pass" placeholder="Min 6 characters" /></div>
    <div class="form-group">
      <label class="form-label">Role</label>
      <select class="form-input" id="s-role">
        <option value="member">Member</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <button class="btn btn-primary btn-full" onclick="doSignup()" style="margin-top:8px">Create Account</button>`;
}

async function doLogin() {
  const email = $('l-email').value.trim();
  const password = $('l-pass').value;
  try {
    const data = await api('POST', '/auth/login', { email, password });
    state.token = data.token; state.user = data.user;
    saveSession(); await loadInitialData(); render();
  } catch(e) {
    $('auth-error').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  }
}

async function doSignup() {
  const name = $('s-name').value.trim();
  const email = $('s-email').value.trim();
  const password = $('s-pass').value;
  const role = $('s-role').value;
  try {
    const data = await api('POST', '/auth/signup', { name, email, password, role });
    state.token = data.token; state.user = data.user;
    saveSession(); await loadInitialData(); render();
  } catch(e) {
    $('auth-error').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  }
}

function renderApp() {
  $('root').innerHTML = `
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo-icon">⚡</div>
        <div class="sidebar-logo-text">TaskFlow</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Navigation</div>
        ${navItem('dashboard', '📊', 'Dashboard')}
        ${navItem('projects', '📁', 'Projects')}
        ${navItem('tasks', '✅', 'Tasks')}
        ${state.user?.role === 'admin' ? navItem('team', '👥', 'Team') : ''}
      </nav>
      <div class="sidebar-footer">
        <div class="user-card" onclick="logout()">
          <div class="user-avatar">${avatarInitials(state.user?.name)}</div>
          <div class="user-info">
            <div class="user-name">${state.user?.name}</div>
            <span class="user-role role-${state.user?.role}">${state.user?.role}</span>
          </div>
          <span style="font-size:16px;color:var(--text3)">↩</span>
        </div>
      </div>
    </aside>
    <main class="main" id="page-content"></main>
  </div>`;
  renderPage();
}

function navItem(page, icon, label, badge = '') {
  return `<div class="nav-item ${state.page === page ? 'active' : ''}" onclick="navigate('${page}')">
    <span class="nav-item-icon">${icon}</span>
    <span>${label}</span>
    ${badge ? `<span class="nav-badge">${badge}</span>` : ''}
  </div>`;
}

function navigate(page) { state.page = page; renderApp(); }

function logout() {
  clearSession();
  state.user = null; state.token = null;
  render();
}

function renderPage() {
  const pages = { dashboard: renderDashboard, projects: renderProjects, tasks: renderTasks, team: renderTeam };
  (pages[state.page] || renderDashboard)();
}

// ============ DASHBOARD ============
async function renderDashboard() {
  $('page-content').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Good ${greeting()}, ${state.user?.name?.split(' ')[0]} 👋</div>
        <div class="page-subtitle">Here's what's happening across your projects</div>
      </div>
    </div>
    <div class="page-content" id="dash-inner"><div class="loading"><div class="spinner"></div> Loading dashboard...</div></div>`;

  try {
    const [dash] = await Promise.all([api('GET', '/tasks/dashboard')]);
    const s = dash.stats;
    $('dash-inner').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card stat-todo">
          <div class="stat-label">To Do</div>
          <div class="stat-value">${s.todo}</div>
          <div class="stat-sub">tasks waiting</div>
        </div>
        <div class="stat-card stat-inprogress">
          <div class="stat-label">In Progress</div>
          <div class="stat-value">${s.in_progress}</div>
          <div class="stat-sub">tasks active</div>
        </div>
        <div class="stat-card stat-done">
          <div class="stat-label">Completed</div>
          <div class="stat-value">${s.done}</div>
          <div class="stat-sub">tasks done</div>
        </div>
        <div class="stat-card stat-overdue">
          <div class="stat-label">Overdue</div>
          <div class="stat-value">${s.overdue}</div>
          <div class="stat-sub">need attention</div>
        </div>
      </div>
      <div class="two-col">
        <div class="card">
          <div class="card-header"><div class="card-title">Project Progress</div></div>
          ${dash.projects.length === 0 ? '<p style="color:var(--text3);font-size:13px">No projects yet</p>' : dash.projects.map(p => {
            const pct = p.total_tasks > 0 ? Math.round((p.done_tasks / p.total_tasks) * 100) : 0;
            return `<div style="margin-bottom:16px">
              <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
                <span style="font-weight:500">${p.name}</span>
                <span style="color:var(--text3)">${p.done_tasks}/${p.total_tasks} tasks</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            </div>`;
          }).join('')}
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">My Overdue Tasks</div></div>
          ${await renderOverdueTasks()}
        </div>
      </div>`;
  } catch(e) {
    $('dash-inner').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  }
}

async function renderOverdueTasks() {
  try {
    const tasks = await api('GET', `/tasks?overdue=true&assigned_to=${state.user.id}`);
    if (tasks.length === 0) return '<p style="color:var(--text3);font-size:13px">🎉 No overdue tasks!</p>';
    return tasks.slice(0,5).map(t => `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px;background:var(--red-dim);border-radius:8px;">
        <span style="font-size:18px">⚠️</span>
        <div>
          <div style="font-size:13px;font-weight:500">${t.title}</div>
          <div style="font-size:12px;color:var(--text3)">${t.project_name} • Due ${formatDate(t.due_date)}</div>
        </div>
      </div>`).join('');
  } catch { return ''; }
}

function greeting() {
  const h = new Date().getHours();
  if (h < 12) return 'morning';
  if (h < 17) return 'afternoon';
  return 'evening';
}

// ============ PROJECTS ============
async function renderProjects() {
  $('page-content').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Projects</div>
        <div class="page-subtitle">Manage your team's projects</div>
      </div>
      ${state.user?.role === 'admin' ? `<button class="btn btn-primary" onclick="openCreateProject()">+ New Project</button>` : ''}
    </div>
    <div class="page-content" id="projects-inner"><div class="loading"><div class="spinner"></div> Loading...</div></div>`;
  await loadProjects();
}

async function loadProjects() {
  try {
    state.projects = await api('GET', '/projects');
    const inner = $('projects-inner');
    if (!inner) return;
    if (state.projects.length === 0) {
      inner.innerHTML = `<div style="text-align:center;padding:60px;color:var(--text3)">
        <div style="font-size:48px;margin-bottom:16px">📁</div>
        <div style="font-size:16px;font-weight:500">No projects yet</div>
        ${state.user?.role === 'admin' ? '<div style="margin-top:12px"><button class="btn btn-primary" onclick="openCreateProject()">Create First Project</button></div>' : ''}
      </div>`;
      return;
    }
    inner.innerHTML = `<div class="three-col">${state.projects.map(p => `
      <div class="project-card" onclick="openProject(${p.id})">
        <div class="project-card-name">${p.name}</div>
        <div class="project-card-desc">${p.description || 'No description'}</div>
        <div class="project-meta">
          <span>✅ ${p.task_count} tasks</span>
          <span>👥 ${p.member_count} members</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
      </div>`).join('')}</div>`;
  } catch(e) { showToast(e.message, 'error'); }
}

function openCreateProject() {
  $('root').insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="modal-create-proj" onclick="if(event.target.id==='modal-create-proj')closeModal('modal-create-proj')">
      <div class="modal">
        <div class="modal-title">Create Project</div>
        <div id="modal-error"></div>
        <div class="form-group"><label class="form-label">Project Name *</label><input class="form-input" id="proj-name" placeholder="e.g. Website Redesign" /></div>
        <div class="form-group"><label class="form-label">Description</label><textarea class="form-input" id="proj-desc" rows="3" placeholder="Brief description..."></textarea></div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal('modal-create-proj')">Cancel</button>
          <button class="btn btn-primary" onclick="createProject()">Create Project</button>
        </div>
      </div>
    </div>`);
}

async function createProject() {
  const name = $('proj-name').value.trim();
  const description = $('proj-desc').value.trim();
  if (!name) { $('modal-error').innerHTML = `<div class="alert alert-error">Name is required</div>`; return; }
  try {
    await api('POST', '/projects', { name, description });
    closeModal('modal-create-proj');
    showToast('Project created!');
    await loadProjects();
  } catch(e) { $('modal-error').innerHTML = `<div class="alert alert-error">${e.message}</div>`; }
}

async function openProject(id) {
  try {
    const project = await api('GET', `/projects/${id}`);
    const allUsers = state.user?.role === 'admin' ? await api('GET', '/projects/users/all') : [];
    const memberIds = project.members.map(m => m.id);
    const nonMembers = allUsers.filter(u => !memberIds.includes(u.id));

    $('root').insertAdjacentHTML('beforeend', `
      <div class="modal-overlay" id="modal-proj-${id}" onclick="if(event.target.id==='modal-proj-${id}')closeModal('modal-proj-${id}')">
        <div class="modal" style="max-width:600px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
            <div>
              <div class="modal-title" style="margin-bottom:4px">${project.name}</div>
              <div style="font-size:13px;color:var(--text2)">${project.description || 'No description'}</div>
            </div>
            ${state.user?.role === 'admin' ? `<button class="btn btn-danger btn-sm" onclick="deleteProject(${id})">Delete</button>` : ''}
          </div>
          <div style="margin-bottom:20px">
            <div class="card-title" style="margin-bottom:12px">Members (${project.members.length})</div>
            <div class="members-list">
              ${project.members.map(m => `
                <div class="member-item">
                  <div class="member-avatar">${avatarInitials(m.name)}</div>
                  <div class="member-info">
                    <div class="member-name">${m.name}</div>
                    <div class="member-email">${m.email}</div>
                  </div>
                  <span class="user-role role-${m.role}">${m.role}</span>
                  ${state.user?.role === 'admin' && m.id !== state.user.id ? `
                    <button class="btn btn-danger btn-sm" onclick="removeMember(${id},${m.id})">Remove</button>` : ''}
                </div>`).join('')}
            </div>
          </div>
          ${state.user?.role === 'admin' && nonMembers.length > 0 ? `
            <div style="display:flex;gap:10px;align-items:flex-end">
              <div class="form-group" style="flex:1;margin-bottom:0">
                <label class="form-label">Add Member</label>
                <select class="form-input" id="add-member-select">
                  ${nonMembers.map(u => `<option value="${u.id}">${u.name} (${u.role})</option>`).join('')}
                </select>
              </div>
              <button class="btn btn-primary" onclick="addMember(${id})">Add</button>
            </div>` : ''}
          <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal('modal-proj-${id}')">Close</button>
            <button class="btn btn-primary" onclick="closeModal('modal-proj-${id}');navigate('tasks');state.filters.project_id='${id}';renderApp()">View Tasks</button>
          </div>
        </div>
      </div>`);
  } catch(e) { showToast(e.message, 'error'); }
}

async function addMember(projectId) {
  const userId = $('add-member-select').value;
  try {
    await api('POST', `/projects/${projectId}/members`, { user_id: userId });
    showToast('Member added!');
    closeModal(`modal-proj-${projectId}`);
    await openProject(projectId);
  } catch(e) { showToast(e.message, 'error'); }
}

async function removeMember(projectId, userId) {
  if (!confirm('Remove this member?')) return;
  try {
    await api('DELETE', `/projects/${projectId}/members/${userId}`);
    showToast('Member removed');
    closeModal(`modal-proj-${projectId}`);
    await openProject(projectId);
  } catch(e) { showToast(e.message, 'error'); }
}

async function deleteProject(id) {
  if (!confirm('Delete this project and ALL its tasks? This cannot be undone.')) return;
  try {
    await api('DELETE', `/projects/${id}`);
    closeModal(`modal-proj-${id}`);
    showToast('Project deleted');
    await loadProjects();
  } catch(e) { showToast(e.message, 'error'); }
}

// ============ TASKS ============
async function renderTasks() {
  $('page-content').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Tasks</div>
        <div class="page-subtitle">Track and manage all tasks</div>
      </div>
      <button class="btn btn-primary" onclick="openCreateTask()">+ New Task</button>
    </div>
    <div class="page-content" id="tasks-inner"><div class="loading"><div class="spinner"></div> Loading...</div></div>`;

  await loadTasks();
}

async function loadTasks() {
  const { status, priority, project_id, overdue } = state.filters;
  let qs = [];
  if (status) qs.push(`status=${status}`);
  if (priority) qs.push(`priority=${priority}`);
  if (project_id) qs.push(`project_id=${project_id}`);
  if (overdue) qs.push(`overdue=true`);
  const query = qs.length ? '?' + qs.join('&') : '';

  try {
    const [tasks, projects] = await Promise.all([
      api('GET', `/tasks${query}`),
      api('GET', '/projects')
    ]);
    state.tasks = tasks;
    state.projects = projects;

    const inner = $('tasks-inner');
    if (!inner) return;
    inner.innerHTML = `
      <div class="filters">
        <select class="filter-select" onchange="state.filters.status=this.value;loadTasks()">
          <option value="">All Statuses</option>
          <option value="todo" ${status==='todo'?'selected':''}>To Do</option>
          <option value="in_progress" ${status==='in_progress'?'selected':''}>In Progress</option>
          <option value="done" ${status==='done'?'selected':''}>Done</option>
        </select>
        <select class="filter-select" onchange="state.filters.priority=this.value;loadTasks()">
          <option value="">All Priorities</option>
          <option value="low" ${priority==='low'?'selected':''}>Low</option>
          <option value="medium" ${priority==='medium'?'selected':''}>Medium</option>
          <option value="high" ${priority==='high'?'selected':''}>High</option>
        </select>
        <select class="filter-select" onchange="state.filters.project_id=this.value;loadTasks()">
          <option value="">All Projects</option>
          ${projects.map(p => `<option value="${p.id}" ${project_id==p.id?'selected':''}>${p.name}</option>`).join('')}
        </select>
        <select class="filter-select" onchange="state.filters.overdue=this.value;loadTasks()">
          <option value="">All Tasks</option>
          <option value="true" ${overdue?'selected':''}>Overdue Only</option>
        </select>
        ${(status||priority||project_id||overdue)?`<button class="btn btn-ghost btn-sm" onclick="state.filters={status:'',priority:'',project_id:'',overdue:''};loadTasks()">Clear Filters</button>`:''}
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Task</th>
                <th>Project</th>
                <th>Assigned To</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Due Date</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${tasks.length === 0 ? `<tr class="empty-row"><td colspan="7">No tasks found</td></tr>` : tasks.map(t => `
                <tr>
                  <td style="font-weight:500;max-width:200px">${t.title}</td>
                  <td style="color:var(--text2);font-size:13px">${t.project_name || '—'}</td>
                  <td>${t.assigned_name ? `<div style="display:flex;align-items:center;gap:7px"><div class="user-avatar" style="width:24px;height:24px;font-size:11px">${avatarInitials(t.assigned_name)}</div>${t.assigned_name}</div>` : '<span style="color:var(--text3)">Unassigned</span>'}</td>
                  <td>
                    <select class="filter-select" style="padding:4px 8px;font-size:12px" onchange="quickStatus(${t.id},this.value)">
                      <option value="todo" ${t.status==='todo'?'selected':''}>To Do</option>
                      <option value="in_progress" ${t.status==='in_progress'?'selected':''}>In Progress</option>
                      <option value="done" ${t.status==='done'?'selected':''}>Done</option>
                    </select>
                  </td>
                  <td><span class="badge badge-${t.priority}">${t.priority}</span></td>
                  <td style="font-size:13px;color:${isOverdue(t.due_date,t.status)?'var(--red)':'var(--text2)'}">
                    ${formatDate(t.due_date)}${isOverdue(t.due_date,t.status)?' ⚠️':''}
                  </td>
                  <td>
                    <div class="task-actions">
                      <button class="btn btn-ghost btn-sm" onclick="openEditTask(${t.id})">Edit</button>
                      ${(state.user?.role==='admin'||t.created_by===state.user?.id)?`<button class="btn btn-danger btn-sm" onclick="deleteTask(${t.id})">Del</button>`:''}
                    </div>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  } catch(e) { showToast(e.message, 'error'); }
}

async function quickStatus(taskId, status) {
  try {
    await api('PATCH', `/tasks/${taskId}/status`, { status });
    showToast('Status updated!');
  } catch(e) { showToast(e.message, 'error'); await loadTasks(); }
}

async function openCreateTask() {
  const projects = await api('GET', '/projects');
  let members = [];
  if (state.user?.role === 'admin') members = await api('GET', '/projects/users/all');

  $('root').insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="modal-create-task" onclick="if(event.target.id==='modal-create-task')closeModal('modal-create-task')">
      <div class="modal">
        <div class="modal-title">Create Task</div>
        <div id="task-modal-error"></div>
        <div class="form-group"><label class="form-label">Title *</label><input class="form-input" id="t-title" placeholder="Task title" /></div>
        <div class="form-group"><label class="form-label">Description</label><textarea class="form-input" id="t-desc" rows="2" placeholder="Optional details..."></textarea></div>
        <div class="form-group"><label class="form-label">Project *</label>
          <select class="form-input" id="t-project">
            <option value="">Select project</option>
            ${projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}
          </select>
        </div>
        ${state.user?.role === 'admin' ? `
        <div class="form-group"><label class="form-label">Assign To</label>
          <select class="form-input" id="t-assign">
            <option value="">Unassigned</option>
            ${members.map(u => `<option value="${u.id}">${u.name}</option>`).join('')}
          </select>
        </div>` : ''}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group"><label class="form-label">Priority</label>
            <select class="form-input" id="t-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">Due Date</label><input class="form-input" type="date" id="t-due" /></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal('modal-create-task')">Cancel</button>
          <button class="btn btn-primary" onclick="createTask()">Create Task</button>
        </div>
      </div>
    </div>`);
}

async function createTask() {
  const title = $('t-title').value.trim();
  const project_id = $('t-project').value;
  const description = $('t-desc')?.value.trim();
  const assigned_to = $('t-assign')?.value || null;
  const priority = $('t-priority').value;
  const due_date = $('t-due').value || null;

  if (!title) { $('task-modal-error').innerHTML = `<div class="alert alert-error">Title is required</div>`; return; }
  if (!project_id) { $('task-modal-error').innerHTML = `<div class="alert alert-error">Select a project</div>`; return; }

  try {
    await api('POST', '/tasks', { title, description, project_id, assigned_to: assigned_to || null, priority, due_date });
    closeModal('modal-create-task');
    showToast('Task created!');
    await loadTasks();
  } catch(e) { $('task-modal-error').innerHTML = `<div class="alert alert-error">${e.message}</div>`; }
}

async function openEditTask(id) {
  const task = await api('GET', `/tasks/${id}`);
  const members = state.user?.role === 'admin' ? await api('GET', '/projects/users/all') : [];

  $('root').insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="modal-edit-task-${id}" onclick="if(event.target.id==='modal-edit-task-${id}')closeModal('modal-edit-task-${id}')">
      <div class="modal">
        <div class="modal-title">Edit Task</div>
        <div id="edit-task-error"></div>
        <div class="form-group"><label class="form-label">Title *</label><input class="form-input" id="et-title" value="${task.title}" /></div>
        <div class="form-group"><label class="form-label">Description</label><textarea class="form-input" id="et-desc" rows="2">${task.description||''}</textarea></div>
        ${state.user?.role === 'admin' ? `
        <div class="form-group"><label class="form-label">Assign To</label>
          <select class="form-input" id="et-assign">
            <option value="">Unassigned</option>
            ${members.map(u => `<option value="${u.id}" ${task.assigned_to===u.id?'selected':''}>${u.name}</option>`).join('')}
          </select>
        </div>` : ''}
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
          <div class="form-group"><label class="form-label">Status</label>
            <select class="form-input" id="et-status">
              <option value="todo" ${task.status==='todo'?'selected':''}>To Do</option>
              <option value="in_progress" ${task.status==='in_progress'?'selected':''}>In Progress</option>
              <option value="done" ${task.status==='done'?'selected':''}>Done</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">Priority</label>
            <select class="form-input" id="et-priority">
              <option value="low" ${task.priority==='low'?'selected':''}>Low</option>
              <option value="medium" ${task.priority==='medium'?'selected':''}>Medium</option>
              <option value="high" ${task.priority==='high'?'selected':''}>High</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">Due Date</label><input class="form-input" type="date" id="et-due" value="${task.due_date?task.due_date.split('T')[0]:''}" /></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal('modal-edit-task-${id}')">Cancel</button>
          <button class="btn btn-primary" onclick="updateTask(${id})">Save Changes</button>
        </div>
      </div>
    </div>`);
}

async function updateTask(id) {
  const title = $('et-title').value.trim();
  const description = $('et-desc').value.trim();
  const assigned_to = $('et-assign')?.value || null;
  const status = $('et-status').value;
  const priority = $('et-priority').value;
  const due_date = $('et-due').value || null;
  if (!title) { $('edit-task-error').innerHTML = `<div class="alert alert-error">Title is required</div>`; return; }
  try {
    await api('PUT', `/tasks/${id}`, { title, description, assigned_to, status, priority, due_date });
    closeModal(`modal-edit-task-${id}`);
    showToast('Task updated!');
    await loadTasks();
  } catch(e) { $('edit-task-error').innerHTML = `<div class="alert alert-error">${e.message}</div>`; }
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  try {
    await api('DELETE', `/tasks/${id}`);
    showToast('Task deleted');
    await loadTasks();
  } catch(e) { showToast(e.message, 'error'); }
}

// ============ TEAM ============
async function renderTeam() {
  $('page-content').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Team Members</div>
        <div class="page-subtitle">All registered users</div>
      </div>
    </div>
    <div class="page-content" id="team-inner"><div class="loading"><div class="spinner"></div> Loading...</div></div>`;

  try {
    const users = await api('GET', '/projects/users/all');
    const taskStats = await api('GET', '/tasks/dashboard');
    $('team-inner').innerHTML = `
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th></tr>
            </thead>
            <tbody>
              ${users.length === 0 ? `<tr class="empty-row"><td colspan="4">No users found</td></tr>` : users.map(u => `
                <tr>
                  <td><div style="display:flex;align-items:center;gap:10px">
                    <div class="user-avatar" style="width:32px;height:32px;font-size:13px">${avatarInitials(u.name)}</div>
                    <span style="font-weight:500">${u.name}</span>
                  </div></td>
                  <td style="color:var(--text2);font-size:13px">${u.email}</td>
                  <td><span class="user-role role-${u.role}">${u.role}</span></td>
                  <td style="color:var(--text3);font-size:13px">${formatDate(u.created_at)}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  } catch(e) { showToast(e.message, 'error'); }
}

// ============ HELPERS ============
function closeModal(id) {
  const m = $(id);
  if (m) m.remove();
}

async function loadInitialData() {
  try {
    state.projects = await api('GET', '/projects');
  } catch {}
}

// ============ BOOT ============
if (initSession()) {
  loadInitialData().then(render);
} else {
  render();
}
</script>
</body>
</html>
